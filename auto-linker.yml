name: Auto-Linker & Tag Suggester
on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  process-orphans:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - id: linker
        run: python .github/scripts/auto_linker.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.linker.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: auto-link orphaned notes and suggest tags'
          title: 'Daily Auto-Linker: Orphaned Notes & Tag Suggestions'
          body: |
            This PR was generated by the Auto-Linker workflow.
            Changes:
            - Found orphaned notes and suggested backlinks
            - Suggested tags based on content analysis
            Please review the suggestions before merging.
          branch: auto-linker/daily-${{ github.run_id }}
