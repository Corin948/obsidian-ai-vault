name: Meeting Note Processor
on:
  push:
    paths:
      - '02-Meetings/**'
  workflow_dispatch:

jobs:
  process-meetings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python .github/scripts/meeting_processor.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-structure meeting notes'
          file_pattern: '02-Meetings/*.md 04-MOCs/*.md'
